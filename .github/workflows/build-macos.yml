name: Build macOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Xcode 15 / macOS 14 SDK — JUCE 7.0.12 compatible

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Cache JUCE source
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-7.0.12-${{ runner.os }}

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build
        run: cmake --build build --parallel

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Dissolution-VST3-macOS
          path: build/Dissolution_artefacts/Release/VST3/

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: Dissolution-AU-macOS
          path: build/Dissolution_artefacts/Release/AU/
